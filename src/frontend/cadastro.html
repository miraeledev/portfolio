<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="css/style.css" />

  <title>Cadastro de Biografia</title>
</head>

<body>
  <div class="container">
    <h2>Cadastro de Biografia</h2>

    <input id="nome" placeholder="Nome" />
    <input id="descricao" placeholder="Descriçâo" />
    <input id="foto" placeholder="Foto" />
    <button onclick="cadastrar()">Cadastrar</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    async function cadastrar() {
      const dados = {
        nome: nome.value,
        descricao: descricao.value,
        foto: foto.value,
      };

      const token = localStorage.getItem("token");

      const res = await fetch("http://localhost:3000/projetos", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token,
        },
        body: JSON.stringify(dados),
      });

      const json = await res.json();
      alert(json.msg || json.erro);

      if (res.ok) {
        nome.value = "";
        descricao.value = "";
        foto.value = "";
      }

      if (res.ok) {
        // 🔁 Redirecionamento
        window.location.href = "cadastro.html";
      }
    }
  </script>
</body>

</html>
